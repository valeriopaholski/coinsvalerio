<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mapa das Moedas</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
    body {
        margin: 0;
        padding: 0;
        background: #f5f5f5;
        font-family: Arial;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h2 {
        margin: 10px;
    }

    #map {
        width: 95vw;
        height: 85vh;
        border: 2px solid #333;
        border-radius: 10px;
    }
</style>
</head>

<body>
    <h2>Países que já tenho moeda</h2>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
    // ✅ Lista de países que você tem moeda — USE CÓDIGOS ISO-3 (BRA, ARG, USA etc.)
    const paisesComMoeda = [
        "BRA", "ARG", "CHL", "URY", "PRY",
        "USA", "CAN",
        "FRA", "ESP", "ITA", "PRT", "DEU",
        "JPN", "CHN", "IND"
    ];

    // ✅ Inicializa o mapa
    const map = L.map('map').setView([20, 0], 2);

    // ✅ Camada do mapa base (open-source)
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 6,
        minZoom: 2,
        attribution: ''
    }).addTo(map);

    // ✅ Carrega o mapa GeoJSON
    fetch("world.geojson")
        .then(res => res.json())
        .then(geo => {
            L.geoJSON(geo, {
                style: feature => ({
                    color: "#333",
                    weight: 1,
                    fillOpacity: 0.9,
                    fillColor: paisesComMoeda.includes(feature.properties.ISO_A3)
                        ? "#00b300"   // ✅ Verde = tem moeda
                        : "#cccccc"   // Cinza = não tem
                }),

                onEachFeature: (feature, layer) => {
                    layer.bindPopup(`<b>${feature.properties.ADMIN}</b>`);
                }
            }).addTo(map);
        });
    </script>
</body>
</html>
